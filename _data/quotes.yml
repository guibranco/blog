- text: "Never, never, never give up."
  author: "Winston Churchill"

- text: "The best way to predict the future is to invent it."
  author: "Alan Kay"

- text: "Any sufficiently advanced technology is indistinguishable from magic."
  author: "Arthur C. Clarke"

- text: "First, solve the problem. Then, write the code."
  author: "John Johnson"

- text: "Simplicity is the soul of efficiency."
  author: "Austin Freeman"

- text: "Make it work, make it right, make it fast."
  author: "Kent Beck"

- text: "The most dangerous phrase in the language is 'we've always done it this way'."
  author: "Grace Hopper"

- text: "Good code is its own best documentation."
  author: "Steve McConnell"

- text: "Programming isn't about what you know; it's about what you can figure out."
  author: "Chris Pine"

- text: "The function of good software is to make the complex appear simple."
  author: "Grady Booch"

- text: "Not all those who wander are lost."
  author: "J.R.R. Tolkien"

- text: "Travel is the only thing you buy that makes you richer."
  author: "Anônimo"

- text: "The world is a book, and those who do not travel read only one page."
  author: "Santo Agostinho"

- text: "Code is like humor. When you have to explain it, it's bad."
  author: "Cory House"

- text: "There are only two hard things in computer science: cache invalidation and naming things."
  author: "Phil Karlton"

- text: "It's not a bug — it's an undocumented feature."
  author: "Anônimo"

- text: "Weeks of coding can save you hours of planning."
  author: "Anônimo"

- text: "An idiot admires complexity, a genius admires simplicity."
  author: "Terry A. Davis"

- text: "The internet is the world's largest library. It's just that all the books are on the floor."
  author: "John Allen Paulos"

- text: "Move fast and break things — then fix them before going to sleep."
  author: "Anônimo"