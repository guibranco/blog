<svg width="1200" height="630" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<style>
.bg{fill:#0f0e0c}.grid{stroke:#1e1c18;stroke-width:.5;fill:none}
.tt{fill:#faf9f6;font-family:Georgia,serif;font-style:italic;font-size:24px}
.st{fill:#5a534a;font-family:'JetBrains Mono','Courier New',monospace;font-size:10px;letter-spacing:.1em}
.lw{fill:#faf9f6;font-family:'JetBrains Mono','Courier New',monospace;font-size:11px}
.lg{fill:#93c97a;font-family:'JetBrains Mono','Courier New',monospace;font-size:11px}
.lm{fill:#5a534a;font-family:'JetBrains Mono','Courier New',monospace;font-size:9px}
.la{fill:#e3b341;font-family:'JetBrains Mono','Courier New',monospace;font-size:11px}
.lb{fill:#58a6ff;font-family:'JetBrains Mono','Courier New',monospace;font-size:10px}
.panel{fill:#1a1814;stroke:#2e2c28;stroke-width:.5}
.panel-g{fill:#0d2010;stroke:#2a5a20;stroke-width:.5}
.panel-a{fill:#2d1b00;stroke:#8a6020;stroke-width:.5}
.panel-b{fill:#0c1d3b;stroke:#1f4f8f;stroke-width:.5}
.bar{fill:#2a5a20}.bar-hi{fill:#93c97a}
.coin{fill:#e3b341;stroke:#8a6020;stroke-width:1}
.coin-shine{fill:#f0c060}
</style>
<defs>
  <marker id="arr" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
    <path d="M0,0 L0,6 L6,3 z" fill="#93c97a"/>
  </marker>
</defs>

<rect class="bg" width="680" height="400"/>
<line class="grid" x1="0" y1="100" x2="680" y2="100"/>
<line class="grid" x1="0" y1="200" x2="680" y2="200"/>
<line class="grid" x1="0" y1="300" x2="680" y2="300"/>
<line class="grid" x1="170" y1="0" x2="170" y2="400"/>
<line class="grid" x1="340" y1="0" x2="340" y2="400"/>
<line class="grid" x1="510" y1="0" x2="510" y2="400"/>
<rect x="0" y="0" width="680" height="400" fill="none" stroke="#1e1c18" stroke-width="1"/>

<!-- Title -->
<text x="40" y="48" class="tt">Desafio das</text>
<text x="40" y="76" class="tt">52 Semanas</text>
<text x="40" y="96" class="st">// poupança progressiva · educação financeira</text>
<line x1="40" y1="104" x2="280" y2="104" stroke="#93c97a" stroke-width=".5" opacity=".6"/>

<!-- Coins stack -->
<ellipse cx="90" cy="320" rx="28" ry="8" class="coin"/>
<rect x="62" y="275" width="56" height="45" class="coin" rx="0"/>
<ellipse cx="90" cy="275" rx="28" ry="8" class="coin"/>
<ellipse cx="90" cy="265" rx="28" ry="8" class="coin"/>
<ellipse cx="90" cy="255" rx="28" ry="8" class="coin"/>
<ellipse cx="90" cy="255" rx="16" ry="4" class="coin-shine" opacity=".5"/>
<text x="90" y="260" text-anchor="middle" class="lm" style="fill:#8a6020;font-size:10px">R$</text>
<text x="90" y="348" text-anchor="middle" class="lm">poupança</text>
<text x="90" y="360" text-anchor="middle" class="lm">acumulada</text>

<!-- Bar chart -->
<g transform="translate(175, 135)">
  <line x1="0" y1="165" x2="330" y2="165" stroke="#2e2c28" stroke-width="1"/>
  <text x="0" y="178" class="lm">Sem. 1</text>
  <text x="298" y="178" class="lm">Sem. 52</text>
  <!-- 13 bars proportional to weeks 4,8,12,16,20,24,28,32,36,40,44,48,52 -->
  <rect x="0"   y="155" width="20" height="10"  class="bar"/>
  <rect x="25"  y="142" width="20" height="23"  class="bar"/>
  <rect x="50"  y="126" width="20" height="39"  class="bar"/>
  <rect x="75"  y="110" width="20" height="55"  class="bar"/>
  <rect x="100" y="93"  width="20" height="72"  class="bar"/>
  <rect x="125" y="77"  width="20" height="88"  class="bar"/>
  <rect x="150" y="61"  width="20" height="104" class="bar"/>
  <rect x="175" y="45"  width="20" height="120" class="bar"/>
  <rect x="200" y="29"  width="20" height="136" class="bar"/>
  <rect x="225" y="13"  width="20" height="152" class="bar"/>
  <rect x="250" y="5"   width="20" height="160" class="bar"/>
  <rect x="275" y="2"   width="20" height="163" class="bar"/>
  <rect x="300" y="0"   width="20" height="165" class="bar-hi"/>
  <!-- labels -->
  <text x="10"  y="151" text-anchor="middle" class="lm" style="fill:#5a534a">R$1</text>
  <text x="310" y="-5"  text-anchor="middle" class="lg">R$52</text>
  <!-- baseline label -->
  <text x="165" y="192" text-anchor="middle" class="lm">R$1 + R$2 + ... + R$52 = R$1.378 (sem juros)</text>
</g>

<!-- Right panels -->
<rect x="530" y="116" width="130" height="76" rx="4" class="panel-g"/>
<text x="595" y="138" text-anchor="middle" class="lg">Início: R$ 1/semana</text>
<text x="595" y="162" text-anchor="middle" style="fill:#93c97a;font-family:Georgia,serif;font-size:20px">R$ 1.378</text>
<text x="595" y="180" text-anchor="middle" class="lm" style="fill:#3a6a30">total em 52 semanas</text>

<rect x="530" y="206" width="130" height="60" rx="4" class="panel-a"/>
<text x="595" y="224" text-anchor="middle" class="la">Início: R$ 5/semana</text>
<text x="595" y="246" text-anchor="middle" style="fill:#e3b341;font-family:Georgia,serif;font-size:18px">R$ 6.890</text>
<text x="595" y="260" text-anchor="middle" class="lm" style="fill:#8a6020">total em 52 semanas</text>

<rect x="530" y="280" width="130" height="60" rx="4" class="panel-b"/>
<text x="595" y="298" text-anchor="middle" class="lb">Início: R$ 10/semana</text>
<text x="595" y="320" text-anchor="middle" style="fill:#58a6ff;font-family:Georgia,serif;font-size:18px">R$ 13.780</text>
<text x="595" y="334" text-anchor="middle" class="lm" style="fill:#1f4f8f">total em 52 semanas</text>

<!-- Progression arrow -->
<path d="M 168 310 L 168 270 L 175 270" stroke="#93c97a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
<text x="128" y="320" class="lm">começa</text>
<text x="128" y="332" class="lm">pequeno</text>
<path d="M 494 310 L 494 270 L 487 270" stroke="#93c97a" stroke-width="1.5" fill="none"/>
<text x="488" y="320" class="lm">termina</text>
<text x="488" y="332" class="lm">grande</text>

<text x="640" y="388" text-anchor="end" class="lm" opacity=".4">© Tecnologia &amp; Viagens</text>
</svg>
