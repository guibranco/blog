name: Blog Structure Audit

on:
  push:
    paths:
      - '_posts/**'
      - 'topicos/**'
      - 'categorias/**'
      - 'feed/**'
  pull_request:
  workflow_dispatch:

jobs:
  audit:
    name: Audit blog structure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Audit structure
        id: audit
        run: python3 .github/scripts/audit_blog.py

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blog-audit-report
          path: audit-report.md
          retention-days: 30
